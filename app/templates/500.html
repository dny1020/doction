<!DOCTYPE html>
<html lang="{{ lang | default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t.error_title }} — doction</title>
  <script>
    /* Tema antes del paint para evitar flash. Standalone: esta página no depende de
       base.html ni de la BD, así no puede volver a romperse dentro del handler de error. */
    try {
      var _t = localStorage.getItem('theme');
      if (!_t) _t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', _t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="no-sidebar">
  <div class="placeholder placeholder--error">
    <h1>{{ t.error_title }}</h1>
    <p class="muted">{{ t.error_desc }}</p>
    <div class="page-actions" style="justify-content:center; margin-top: 1rem;">
      <a class="btn btn-primary" href="/">{{ t.back_home }}</a>
    </div>
  </div>
</body>
</html>
