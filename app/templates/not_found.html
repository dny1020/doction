{% extends "base.html" %}
{% block title %}Not found — doction{% endblock %}
{% block content %}
<div class="placeholder">
  <h1>Page not found</h1>
  <p class="muted">No page exists at <code>{{ slug }}</code>.</p>
  <div class="page-actions" style="justify-content:center; margin-top: 1rem;">
    <a class="btn btn-primary" href="/new?slug={{ slug }}">Create this page</a>
    <a class="btn" href="/">Back home</a>
  </div>
</div>
{% endblock %}
