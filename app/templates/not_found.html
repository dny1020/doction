{% extends "base.html" %}
{% block title %}{{ t.nf_title }} — doction{% endblock %}
{% block content %}
<div class="placeholder">
  <h1>{{ t.nf_title }}</h1>
  <p class="muted">{{ t.nf_desc }} <code>{{ slug }}</code>.</p>
  <div class="page-actions" style="justify-content:center; margin-top: 1rem;">
    <a class="btn btn-primary" href="/new?slug={{ slug }}">{{ t.create_this_page }}</a>
    <a class="btn" href="/">{{ t.back_home }}</a>
  </div>
</div>
{% endblock %}
