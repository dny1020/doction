{% extends "base.html" %}
{% block title %}{{ t.new_page }} — doction{% endblock %}
{% block content %}
<form class="editor" method="post" action="/pages">
  <div class="editor-bar">
    <input class="title-input" type="text" name="title" value="{{ prefill_title }}"
           placeholder="{{ t.title }}" required autofocus>
    <div class="editor-actions">
      <a class="btn" href="/">{{ t.cancel }}</a>
      <button class="btn btn-primary" type="submit">{{ t.create }}</button>
    </div>
  </div>

  {% if parent %}
  <p class="meta">{{ t.parent }} <a href="/pages/{{ parent.slug }}">{{ parent.title }}</a></p>
  <input type="hidden" name="parent_slug" value="{{ parent.slug }}">
  {% endif %}
  {% if prefill_slug %}
  <input type="hidden" name="slug" value="{{ prefill_slug }}">
  {% endif %}

  <div class="editor-split">
    <textarea class="editor-textarea" name="content" placeholder="{{ t.write_markdown }}"
              data-msg-uploading="{{ t.img_uploading }}"
              data-msg-upload-ok="{{ t.img_uploaded }}"
              data-msg-upload-error="{{ t.img_upload_failed }}"
              hx-post="/preview"
              hx-trigger="keyup changed delay:250ms"
              hx-target="#preview"
              hx-indicator="#preview"
              hx-swap="innerHTML"></textarea>
    <div class="prose preview preview-empty" id="preview">{{ t.preview_hint }}</div>
  </div>
</form>
{% endblock %}
