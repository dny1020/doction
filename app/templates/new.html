{% extends "base.html" %}
{% block title %}New page — doction{% endblock %}
{% block content %}
<form class="editor" method="post" action="/pages">
  <div class="editor-bar">
    <input class="title-input" type="text" name="title" placeholder="Title" required autofocus>
    <div class="editor-actions">
      <a class="btn" href="/">Cancel</a>
      <button class="btn btn-primary" type="submit">Create</button>
    </div>
  </div>
  <div class="editor-split">
    <textarea class="editor-textarea" name="content" placeholder="Write markdown…"
              hx-post="/preview"
              hx-trigger="keyup changed delay:250ms"
              hx-target="#preview"
              hx-swap="innerHTML"></textarea>
    <div class="prose preview preview-empty" id="preview">Start typing to see preview.</div>
  </div>
</form>
{% endblock %}
