<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MiniDocMost{% endblock %}</title>
  <script>
    /* Apply saved sidebar state + theme before paint to avoid a flash. */
    try {
      if (localStorage.getItem('sidebarCollapsed') === '1')
        document.documentElement.classList.add('sidebar-collapsed');
    } catch (e) {}
    try {
      var _t = localStorage.getItem('theme');
      if (!_t) _t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', _t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/htmx.min.js" defer></script>
</head>
<body>
  <button class="sidebar-toggle sidebar-toggle--show" type="button"
          aria-label="Show sidebar" title="Show sidebar"
          aria-expanded="true" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" onclick="toggleSidebar()" aria-hidden="true"></div>
  <div class="layout">
    <aside class="sidebar" aria-label="Sidebar">
      <div class="sidebar-head">
        <a class="brand" href="/">MiniDocMost</a>
        <button class="sidebar-toggle sidebar-toggle--hide" type="button"
                aria-label="Hide sidebar" title="Hide sidebar"
                aria-expanded="true" onclick="toggleSidebar()">«</button>
      </div>
      {% if user_email %}
      <div class="user-block">
        <div class="user-email">{{ user_email }}</div>
        <form method="post" action="/logout">
          <button class="btn btn-ghost" type="submit">Log out</button>
        </form>
      </div>
      {% endif %}
      {% if user_email %}
      <a class="new-btn" href="/new">+ New page</a>
      <div class="search">
        <input
          type="search"
          name="q"
          placeholder="Search…"
          autocomplete="off"
          hx-get="/search"
          hx-trigger="keyup changed delay:200ms, search"
          hx-target="#search-results"
          hx-swap="innerHTML">
        <div id="search-results"></div>
      </div>
      <nav class="page-list">
        {% include "partials/sidebar_list.html" %}
      </nav>
      {% else %}
      <div class="auth-links">
        <a class="btn" href="/login">Log in</a>
        <a class="btn btn-primary" href="/register">Create account</a>
      </div>
      {% endif %}
    </aside>
    <main class="content">
      <div class="topbar">
        <div class="topbar-right">
          <button class="theme-toggle" type="button" onclick="toggleTheme()"
                  title="Toggle theme" aria-label="Toggle theme">
            <span class="theme-icon-moon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </span>
            <span class="theme-icon-sun" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </span>
          </button>
          {% if user_email %}
          <div class="avatar" id="user-avatar" title="{{ user_email }}">{{ user_email[0] | upper }}</div>
          {% endif %}
        </div>
      </div>
      <div class="content-body">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <script>
    function syncSidebarAria() {
      var expanded = !document.documentElement.classList.contains('sidebar-collapsed');
      var toggles = document.querySelectorAll('.sidebar-toggle');
      toggles.forEach(function (btn) { btn.setAttribute('aria-expanded', String(expanded)); });
    }

    function toggleSidebar() {
      var root = document.documentElement;
      var collapsed = root.classList.toggle('sidebar-collapsed');
      var expanded = !collapsed;
      var toggles = document.querySelectorAll('.sidebar-toggle');
      toggles.forEach(function (btn) { btn.setAttribute('aria-expanded', String(expanded)); });
      try { localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0'); } catch (e) {}
    }

    function toggleTheme() {
      var root = document.documentElement;
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
    }

    (function () {
      var avatar = document.getElementById('user-avatar');
      if (!avatar) return;
      var palette = ['#c0604a','#4a7fc0','#4aab6e','#8b5fc0','#c0914a','#4aabc0','#c05473','#7a9c4a'];
      var email = avatar.getAttribute('title') || '';
      var h = 0;
      for (var i = 0; i < email.length; i++) h = (h * 31 + email.charCodeAt(i)) & 0xfffffff;
      avatar.style.background = palette[h % palette.length];
    })();

    syncSidebarAria();

    if (typeof htmx !== 'undefined') {
      document.body.addEventListener('htmx:afterSwap', function (event) {
        if (event.detail && event.detail.target && event.detail.target.id === 'preview') {
          event.detail.target.classList.remove('preview-empty');
        }
      });
    }

    document.addEventListener('keydown', function (event) {
      if (event.defaultPrevented) return;
      var target = event.target;
      if (target && (target.isContentEditable || target.tagName === 'INPUT' || target.tagName === 'TEXTAREA')) return;
      if (event.key === '[' || event.key === ']') {
        toggleSidebar();
      }
      if (event.key === 'Escape') {
        if (!document.documentElement.classList.contains('sidebar-collapsed')) {
          toggleSidebar();
        }
      }
    });
  </script>
</body>
</html>
