{% extends "base.html" %}
{% block title %}Register — MiniDocMost{% endblock %}
{% block content %}
<div class="auth">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="muted">Start your private knowledge base.</p>
    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register">
      <label class="auth-label" for="email">Email</label>
      <input class="auth-input" id="email" type="email" name="email" required autofocus>
      <label class="auth-label" for="password">Password</label>
      <input class="auth-input" id="password" type="password" name="password" required>
      <button class="btn btn-primary auth-submit" type="submit">Create account</button>
    </form>
    <p class="auth-switch">Have an account? <a href="/login">Log in</a></p>
  </div>
</div>
{% endblock %}
