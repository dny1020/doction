name: deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Install tools
        run: apk add --no-cache docker-cli curl

      - name: Checkout
        run: |
          REPO="http://oauth2:${{ secrets.GIT_TOKEN }}@gitea:3000/${{ gitea.repository }}.git"
          if [ -d /opt/doction/.git ]; then
            git -C /opt/doction remote set-url origin "$REPO"
            git -C /opt/doction fetch --depth=1 origin main
            git -C /opt/doction reset --hard FETCH_HEAD
          else
            rm -rf /opt/doction
            git clone --depth=1 "$REPO" /opt/doction
          fi

      - name: Prepare data dir
        run: mkdir -p /mnt/ssd/doction

      - name: Build image
        run: docker build -t doction:latest /opt/doction

      - name: Deploy
        run: |
          docker rm -f doction 2>/dev/null || true
          docker run -d \
            --name doction \
            --restart unless-stopped \
            --network proxy_net \
            -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
            -v /mnt/ssd/doction:/data \
            doction:latest

      - name: Health check
        run: |
          ok=0
          for i in $(seq 1 20); do
            IP=$(docker inspect -f '{{(index .NetworkSettings.Networks "proxy_net").IPAddress}}' doction 2>/dev/null)
            if curl -sf "http://${IP}:8000/health" >/dev/null 2>&1; then
              ok=1; break
            fi
            sleep 2
          done
          [ $ok -eq 1 ] && echo "doction is up" || { echo "health check failed"; exit 1; }
