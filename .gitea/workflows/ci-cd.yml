name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint and test
    runs-on: ubuntu-latest
    container: python-git:3.13-bookworm
    env:
      HF_HUB_OFFLINE: "1"
      UV_CACHE_DIR: /root/.cache/uv
    steps:
      - name: Checkout
        run: |
          git clone "http://dany:${{ secrets.GIT_TOKEN }}@gitea:3000/${GITHUB_REPOSITORY}.git" .
          git checkout "$GITHUB_SHA"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: timeout 240s uv run pytest tests/test.py tests/test_git.py tests/test_mcp.py -q

