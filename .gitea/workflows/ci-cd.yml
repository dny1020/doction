name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint and test
    runs-on: ubuntu-latest
    container: python:3.13-bookworm
    steps:
      - name: Install Git
        run: apt-get update -qq && apt-get install -y -qq git

      - name: Checkout
        run: |
          git clone "http://dany:${{ secrets.GIT_TOKEN }}@gitea:3000/${GITHUB_REPOSITORY}.git" .
          git checkout "$GITHUB_SHA"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: timeout 120s uv run pytest tests/test.py -q

  package:
    name: Build and smoke test
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Install Git
        run: apt-get update -qq && apt-get install -y -qq git curl

      - name: Checkout
        run: |
          git clone "http://dany:${{ secrets.GIT_TOKEN }}@gitea:3000/${GITHUB_REPOSITORY}.git" .
          git checkout "$GITHUB_SHA"

      - name: Install Docker CLI
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker.io curl
          fi

      - name: Build image
        run: docker build -t doction:${GITHUB_SHA} .

      - name: Smoke test image
        run: |
          name="doction-smoke-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          docker rm -f "$name" >/dev/null 2>&1 || true
          docker run -d --name "$name" --network proxy_net doction:${GITHUB_SHA}
          for i in $(seq 1 30); do
            if curl -fsS "http://${name}:8000/docs" >/dev/null; then
              docker rm -f "$name"
              exit 0
            fi
            sleep 1
          done
          docker logs "$name"
          docker rm -f "$name"
          exit 1

  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # Container name == nginx upstream host (doction.danilocloud.me -> http://doction:8000).
      APP_NAME: doction
      # Persistent data lives on the SSD-backed volume (pre-created on the host).
      DATA_DIR: /mnt/ssd/doction
    steps:
      - name: Install Docker CLI
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker.io curl
          fi

      - name: Deploy container
        run: |
          set -e
          IMAGE="doction:${GITHUB_SHA}"

          # Keep a rolling 'latest' tag for easy manual rollback on the host.
          docker tag "$IMAGE" "${APP_NAME}:latest"

          # Replace the running container with the freshly built image.
          # No host port is published: nginx (the reverse proxy on proxy_net)
          # already owns host :8000 and fronts services by container name.
          docker rm -f "$APP_NAME" >/dev/null 2>&1 || true
          docker run -d \
            --name "$APP_NAME" \
            --network proxy_net \
            --restart unless-stopped \
            -v "${DATA_DIR}:/data" \
            -e DATABASE_PATH=/data/doction.db \
            "$IMAGE"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS "http://${APP_NAME}:8000/health" >/dev/null; then
              echo "Doction is up and healthy."
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed — recent container logs:"
          docker logs --tail 50 "$APP_NAME" || true
          exit 1

      - name: Prune old images
        if: always()
        run: docker image prune -f >/dev/null 2>&1 || true
